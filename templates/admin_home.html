<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATU Engine - Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #ecf0f1; padding: 40px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #3498db; color: white; text-align: center; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ TD Control Center</h1>
        <h3>Select a Tournament:</h3>
        {% for t in tournaments %}
            <a href="{{ url_for('tournament_dashboard', name=t) }}" class="btn">{{ t }}</a>
        {% endfor %}
    </div>
</body>
</html>
