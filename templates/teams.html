<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ tournament_name }} - Team Standings</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 10px; }
        .nav-links { text-align: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid #eee; }
        .nav-links a { margin: 0 10px; text-decoration: none; color: #3498db; font-weight: bold; }
        .nav-links a:hover { text-decoration: underline; color: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 15px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background-color: #2c3e50; color: white; font-weight: 600; text-transform: uppercase; font-size: 0.9em; }
        tr:hover { background-color: #f5f7fa; }
        .rank { font-weight: bold; color: #e74c3c; }
        .team-name { text-align: left; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 {{ tournament_name }}</h1>
        
        <div class="nav-links">
            <a href="../index.html">⬅️ Master Portal</a> |
            <a href="index.html">Standings</a> |
            <a href="pairings.html">Pairings</a> |
            <a href="wallchart.html">Wallchart</a> |
            <a href="players.html">Player Profiles</a> |
            <a href="teams.html">Team Standings</a>
        </div>

        <h2>Team Standings</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th style="text-align: left;">Team / Club</th>
                    <th>Total Wins</th>
                    <th>Total Spread</th>
                </tr>
            </thead>
            <tbody>
                {% for team in teams %}
                <tr>
                    <td class="rank">{{ loop.index }}</td>
                    <td class="team-name">{{ team.name }}</td>
                    <td><strong>{{ team.wins }}</strong></td>
                    <td>{{ team.spread }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
