<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATU Scrabble Tournaments</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full text-center border-t-4 border-blue-900">
        <h1 class="text-3xl font-bold text-blue-900 mb-2">ATU Scrabble</h1>
        <h2 class="text-xl text-gray-500 mb-8">Tournament Portal</h2>
        
        <p class="text-gray-600 mb-6 font-medium">Select an active tournament:</p>
        
        <div class="space-y-4">
            {% for t in tournaments %}
            <a href="{{ t.path }}/index.html" class="block w-full py-4 px-4 bg-blue-50 text-blue-800 font-bold rounded-lg hover:bg-blue-800 hover:text-white transition duration-200 border border-blue-200 shadow-sm">
                {{ t.name }}
            </a>
            {% endfor %}
            
            {% if not tournaments %}
            <p class="text-gray-400 italic bg-gray-50 py-4 rounded-lg">No tournaments are currently active.</p>
            {% endif %}
        </div>
        
        <div class="mt-8 text-xs text-gray-400">
            Powered by the ATU Scrabble Engine
        </div>
    </div>
</body>
</html>
